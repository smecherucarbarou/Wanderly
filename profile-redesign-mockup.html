<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile Redesign Mockup</title>
  <style>
    :root {
      --bg: #0c1110;
      --surface: #151c19;
      --surface-2: #1f281f;
      --surface-3: #26311f;
      --text: #fff8e8;
      --muted: #c7c2b4;
      --soft: #8f998f;
      --line: rgba(255, 248, 232, 0.12);
      --honey: #ffb323;
      --honey-2: #e19000;
      --teal: #6cd4c4;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 22% 14%, rgba(255, 179, 35, 0.18), transparent 32%),
        radial-gradient(circle at 82% 28%, rgba(108, 212, 196, 0.11), transparent 30%),
        #050706;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .phone {
      width: min(430px, 100vw);
      min-height: 932px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 179, 35, 0.08), transparent 38%),
        var(--bg);
      box-shadow: var(--shadow);
    }

    .status-bar {
      height: 48px;
      padding: 14px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .system-icons {
      display: flex;
      gap: 8px;
      align-items: center;
      color: rgba(255, 255, 255, 0.86);
    }

    .battery {
      min-width: 34px;
      height: 22px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.9);
      color: #1f231f;
      font-size: 13px;
      font-weight: 800;
    }

    main {
      padding: 18px 22px 104px;
    }

    .profile-card {
      position: relative;
      padding: 20px;
      border: 1px solid rgba(255, 179, 35, 0.46);
      border-radius: 30px;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 179, 35, 0.18), transparent 36%),
        linear-gradient(180deg, rgba(31, 40, 31, 0.98), rgba(18, 24, 21, 0.98));
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.26);
    }

    .profile-top {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px;
      align-items: center;
    }

    .avatar-wrap {
      position: relative;
      width: 92px;
      height: 92px;
    }

    .avatar-ring {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      padding: 5px;
      background:
        conic-gradient(from 30deg, var(--honey), #fff0ad, var(--honey-2), var(--honey));
      box-shadow: 0 0 0 7px rgba(255, 179, 35, 0.12);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid #111712;
      background:
        linear-gradient(135deg, rgba(255, 58, 99, 0.86), rgba(13, 149, 224, 0.78)),
        linear-gradient(45deg, #2b2b2b 0 25%, #f6d84e 25% 50%, #1bb3e9 50% 75%, #262626 75%);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
    }

    .camera-button {
      position: absolute;
      right: -6px;
      bottom: -5px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 3px solid #121815;
      border-radius: 14px;
      background: var(--honey);
      color: #161a13;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.24);
    }

    .identity {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 32px;
      line-height: 1.05;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-button {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--honey);
    }

    .friend-code {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.16);
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    .friend-code strong {
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .title-band {
      margin-top: 22px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255, 179, 35, 0.22), rgba(108, 212, 196, 0.08));
      border: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .title-chip {
      width: fit-content;
      max-width: 100%;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--honey), var(--honey-2));
      color: #17160f;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 850;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.36);
    }

    .rank {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .rank span {
      color: var(--honey);
    }

    .stats-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 116px;
      padding: 14px 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.045);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat-label {
      display: flex;
      gap: 7px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .stat svg {
      width: 18px;
      height: 18px;
      color: var(--teal);
    }

    .stat-value {
      color: var(--honey);
      font-size: clamp(20px, 5.6vw, 30px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .progress-card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 26px;
      background: var(--surface);
      border: 1px solid rgba(108, 212, 196, 0.16);
    }

    .progress-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 850;
    }

    .progress-max {
      color: var(--teal);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .progress-track {
      height: 12px;
      margin: 18px 0 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--honey), var(--honey-2));
    }

    .progress-note {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 86px;
      padding: 10px 16px 18px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      background: rgba(24, 28, 22, 0.94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .nav-item {
      display: grid;
      place-items: center;
      gap: 3px;
      border: 0;
      background: transparent;
      color: rgba(255, 248, 232, 0.58);
      font: inherit;
      font-size: 11px;
      font-weight: 750;
    }

    .nav-item svg {
      width: 25px;
      height: 25px;
      stroke-width: 2.2;
    }

    .nav-item.active {
      color: var(--honey);
    }

    svg {
      display: block;
    }
  </style>
</head>
<body>
  <section class="phone" aria-label="Redesigned profile screen mockup">
    <div class="status-bar">
      <div>11:46 AM&nbsp;&nbsp;4/24</div>
      <div class="system-icons" aria-hidden="true">
        <span>⌁</span>
        <span>▥</span>
        <span class="battery">62</span>
      </div>
    </div>

    <main>
      <section class="profile-card">
        <div class="profile-top">
          <div class="avatar-wrap">
            <div class="avatar-ring">
              <div class="avatar">C</div>
            </div>
            <div class="camera-button" aria-label="Change profile photo">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 7l1.5-2h5L16 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
          </div>

          <div class="identity">
            <p class="eyebrow">My Hive Profile</p>
            <div class="name-row">
              <h1>carbarouu</h1>
              <button class="icon-button" aria-label="Edit username">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20h4l10.5-10.5a2.3 2.3 0 0 0-3.25-3.25L4.75 16.75 4 20Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M14 7l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <div class="friend-code">
              <span>Friend Code</span>
              <strong>9NTN7Z</strong>
              <a class="icon-button" aria-label="Share friend code" href="wanderly://invite/9NTN7Z" title="Open Wanderly invite link">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
                  <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                  <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
                  <path d="M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </a>
            </div>
          </div>
        </div>

        <div class="title-band">
          <div class="title-chip">Queen of Exploration</div>
          <p class="rank">Rank <span>Adventurer</span></p>
        </div>

        <div class="stats-grid" aria-label="Profile stats">
          <article class="stat">
            <div class="stat-label">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 10c0-3 2.6-5 5.8-5h2.4C16.4 5 19 7 19 10v6.5A3.5 3.5 0 0 1 15.5 20h-7A3.5 3.5 0 0 1 5 16.5V10Z" stroke="currentColor" stroke-width="2"/>
                <path d="M8 9h8M9 13h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Honey
            </div>
            <div class="stat-value">994,464</div>
          </article>

          <article class="stat">
            <div class="stat-label">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3s5 4 5 9a5 5 0 0 1-10 0c0-1.8 1-3.8 2.3-5.5.5 2.4 1.8 3.6 2.7 4.1.9-1.8 0-4.5 0-7.6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              Streak
            </div>
            <div class="stat-value">58</div>
          </article>

          <article class="stat">
            <div class="stat-label">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 11.5 21 4l-7.5 18-2-8.5L3 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              Flights
            </div>
            <div class="stat-value">19,889</div>
          </article>
        </div>
      </section>

      <section class="progress-card">
        <div class="progress-head">
          <h2>Hive Progress</h2>
          <span class="progress-max">Max rank</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill"></div>
        </div>
        <p class="progress-note">Maximum rank achieved!</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item" aria-label="Map">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m3 6 5-2 8 3 5-2v13l-5 2-8-3-5 2V6Z" stroke="currentColor" stroke-linejoin="round"/>
          <path d="M8 4v13M16 7v13" stroke="currentColor"/>
        </svg>
      </button>
      <button class="nav-item" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor"/>
          <path d="m16 16 4 4" stroke="currentColor" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="nav-item" aria-label="Trips">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7 4h10v4H7zM5 10h14v10H5z" stroke="currentColor" stroke-linejoin="round"/>
          <path d="M9 14h6M9 17h4" stroke="currentColor" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="nav-item" aria-label="Share">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="18" cy="5" r="3" stroke="currentColor"/>
          <circle cx="6" cy="12" r="3" stroke="currentColor"/>
          <circle cx="18" cy="19" r="3" stroke="currentColor"/>
          <path d="M8.7 10.7l6.6-4.4M8.7 13.3l6.6 4.4" stroke="currentColor" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="nav-item active" aria-label="My Hive">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M8 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM3 21v-2a5 5 0 0 1 10 0v2M17 12v8M14 15h6" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span>My Hive</span>
      </button>
    </nav>
  </section>
</body>
</html>
